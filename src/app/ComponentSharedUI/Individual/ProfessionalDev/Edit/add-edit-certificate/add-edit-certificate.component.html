<h2 mat-dialog-title>Edit Certificate</h2>
<form #form="ngForm">
  <div mat-dialog-content>
    <!-- School Name -->
        <mat-form-field appearance="standard" class="full-width">
            <mat-label>Certificate</mat-label>
            <input matInput [(ngModel)]="data.certificate_title" name="certificate_title" required />
          </mat-form-field>

        <mat-form-field appearance="standard" class="full-width">
          <mat-label>Provider</mat-label>
          <input matInput [(ngModel)]="data.certificate_provider" name="certificate_provider" required />
        </mat-form-field>
        
        <mat-form-field appearance="standard" class="full-width">
            <mat-label>Date Completed</mat-label>
            <input matInput [matDatepicker]="picker"  [(ngModel)]="data.date_completed" required />
            <mat-datepicker-toggle
              matSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

  </div>

  <div class="button-end">
    <button mat-raised-button color="warn"  (click)="onNoClick()">Cancel</button>
    <button mat-raised-button color="primary"[disabled]="!form.valid" (click)="save()"> Update</button>
  </div>
</form>
