<div class="search-div">
    <mat-form-field class="w-40" floatLabel="never" appearance="standard">
        <input matInput [(ngModel)]="searchKey" [placeholder]="placeHolder" (keyup)="applyFilter()">
        <button mat-button matSuffix mat-icon-button aria-label="Clear" (click)="clearSearch()">
            <mat-icon>close</mat-icon>
        </button>
    </mat-form-field>
    <button mat-raised-button color="warn" (click)="getPlans()">View</button>
</div>

<section class="container-fluid">
    <mat-table [dataSource]="dataSource" class="mat-elevation-z4" matSort>
        <!-- Columns -->
        <!-- PLAN ID -->
        <ng-container matColumnDef="planId">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Plan ID
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                <strong>{{ row.planId }}</strong>
            </mat-cell>
        </ng-container>

          <ng-container matColumnDef="sort_number">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Sort Number
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                <strong>{{ row.sort_number }}</strong>
            </mat-cell>
        </ng-container>


        <ng-container matColumnDef="plan_name">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Plan Name
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                {{ row.plan_name }}
            </mat-cell>
        </ng-container>

        <!-- PRICE -->
        <ng-container matColumnDef="price">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Price
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                <span class="price">
                    ₱{{ row.price | number:'1.2-2' }}
                </span>
            </mat-cell>
        </ng-container>

        <!-- TAG -->
        <ng-container matColumnDef="tag">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Badge
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                <span class="plan-tag">
                    {{ row.tag }}
                </span>
            </mat-cell>
        </ng-container>

        <!-- STATUS -->
        <ng-container matColumnDef="recordStatus">
            <mat-header-cell *matHeaderCellDef mat-sort-header>
                Status
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
                <span
                    [ngClass]="{'active': row.recordStatus === 'Active', 'inactive': row.recordStatus === 'Inactive'}">
                    {{ row.recordStatus }}
                </span>
            </mat-cell>
        </ng-container>


        <ng-container matColumnDef="actions">
            <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
            <mat-cell *matCellDef="let row">
                <button mat-icon-button color="primary" (click)="view(row)"
                    matTooltip="add features"><mat-icon>add_circle</mat-icon></button>
            </mat-cell>
        </ng-container>

        <ng-container matColumnDef="noData">
            <mat-footer-cell *matFooterCellDef colspan="6">
                No plans found.
            </mat-footer-cell>
        </ng-container>


        <!-- Header & Rows -->
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns" (click)="onRowClick(row)"
            (contextmenu)="openContextMenu($event, row)">
        </mat-row>
        <mat-footer-row *matFooterRowDef="['noData']" [ngClass]="{'hide': dataSource.data.length > 0}"></mat-footer-row>

    </mat-table>

    <mat-progress-bar *ngIf="isLoading" mode="indeterminate" color="primary"></mat-progress-bar>
    <mat-paginator [pageSize]="7" [pageSizeOptions]="pageSizeOptions" showFirstLastButtons></mat-paginator>
</section>


<!-- Context Menu Template -->
<ng-template #contextMenuTemplate>
    <div class="custom-menu" style="background: white; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,.2);">
        <button mat-menu-item color="primary" (click)="edit(contextMenuRow)">
            <mat-icon>edit</mat-icon> Edit
        </button>
        <button mat-menu-item color="warn" (click)="delete(contextMenuRow)">
            <mat-icon>delete</mat-icon> Delete
        </button>
        <!-- <button mat-icon-button color="accent" (click)="view(row)" matTooltip="View Plan">
            <mat-icon>visibility</mat-icon>
        </button> -->
    </div>
</ng-template>
